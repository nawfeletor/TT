<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
:root{--red:#B22222;--bone:rgba(232,224,208,.92);--dim:rgba(232,224,208,.5);--faint:rgba(232,224,208,.25)}
html,body{width:320px;height:110px;overflow:hidden;background:transparent;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{width:320px;height:110px;background:rgba(10,8,12,.88);border:1px solid rgba(139,0,0,.35);border-radius:14px;backdrop-filter:blur(20px);display:flex;align-items:center;padding:12px 14px;gap:12px;-webkit-app-region:drag;position:relative;overflow:hidden}
/* Glow pulse on playing */
.wrap::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse 60% 40% at 30% 50%,rgba(139,0,0,.12) 0%,transparent 70%);pointer-events:none}
/* Progress line at very bottom */
.prog-line{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--red),#7B2FBE);border-radius:0 0 14px 14px;transition:width .3s linear;width:0%}
.art{width:54px;height:54px;border-radius:8px;background:rgba(26,21,32,.8);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid rgba(139,0,0,.2)}
.art img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.info{flex:1;min-width:0}
.title{font-size:12px;font-weight:500;color:var(--bone);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.artist{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.ctrl{display:flex;align-items:center;gap:2px;-webkit-app-region:no-drag}
.btn{width:26px;height:26px;background:none;border:none;cursor:pointer;color:var(--dim);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s}
.btn:hover{background:rgba(232,224,208,.08);color:var(--bone)}
.play-btn{width:28px;height:28px;background:var(--bone);color:#050305;border:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s}
.play-btn:hover{background:#fff;transform:scale(1.08)}
.top-btns{position:absolute;top:6px;right:8px;display:flex;gap:4px;-webkit-app-region:no-drag;opacity:0;transition:opacity .15s}
.wrap:hover .top-btns{opacity:1}
.top-btn{background:none;border:none;cursor:pointer;color:var(--faint);font-size:11px;padding:2px 4px;border-radius:3px;transition:all .12s}
.top-btn:hover{background:rgba(232,224,208,.08);color:var(--bone)}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="prog-line" id="prog"></div>
  <div class="art" id="art">☽</div>
  <div class="info">
    <div class="title" id="title">Nothing playing</div>
    <div class="artist" id="artist">—</div>
    <div class="ctrl">
      <button class="btn" onclick="MINI.prev()">⏮</button>
      <button class="play-btn" id="play-btn" onclick="MINI.playpause()">▶</button>
      <button class="btn" onclick="MINI.next()">⏭</button>
    </div>
  </div>
  <div class="top-btns">
    <button class="top-btn" onclick="MINI.showMain()" title="Show main window">⬆</button>
    <button class="top-btn" onclick="MINI.close()" title="Close mini player">✕</button>
  </div>
</div>
<script>
MINI.onUpdate(function(d){
  if(!d)return;
  document.getElementById('title').textContent=d.title||'—';
  document.getElementById('artist').textContent=d.artist||'—';
  var artEl=document.getElementById('art');
  artEl.innerHTML=d.thumb?'<img src="'+d.thumb+'" alt=""/>':'☽';
  document.getElementById('play-btn').textContent=d.isPlaying?'⏸':'▶';
  var pct=d.duration>0?Math.min((d.position/d.duration)*100,100):0;
  document.getElementById('prog').style.width=pct+'%';
});
</script>
</body>
</html>
